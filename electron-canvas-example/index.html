<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Content Security Policy to enforce local-only scripts and safe loading -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electron Canvas Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Left Sidebar Toolbar -->
    <aside class="sidebar">
      <div class="brand">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" class="brand-icon">
          <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/>
          <path d="M12 8C14.2091 8 16 9.79086 16 12C16 14.2091 14.2091 16 12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8Z" fill="currentColor" fill-opacity="0.3"/>
          <path d="M12 2V6M12 18V22M2 12H6M18 12H22"/>
        </svg>
        <span>Canvas Studio</span>
      </div>

      <nav class="tool-section">
        <h3 class="section-title">Drawing Tools</h3>
        <div class="tool-grid">
          <button class="tool-btn active" id="tool-pencil" title="Freehand Drawing (P)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
              <path d="m15 5 4 4"/>
            </svg>
            <span class="btn-label">Pencil</span>
          </button>
          
          <button class="tool-btn" id="tool-line" title="Straight Line (L)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M5 19 19 5"/>
              <circle cx="5" cy="19" r="2" fill="currentColor"/>
              <circle cx="19" cy="5" r="2" fill="currentColor"/>
            </svg>
            <span class="btn-label">Line</span>
          </button>

          <button class="tool-btn" id="tool-rectangle" title="Rectangle (R)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
            <span class="btn-label">Rectangle</span>
          </button>

          <button class="tool-btn" id="tool-square" title="Square (S)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <rect x="5" y="5" width="14" height="14" rx="1"/>
            </svg>
            <span class="btn-label">Square</span>
          </button>

          <button class="tool-btn" id="tool-circle" title="Circle (C)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <circle cx="12" cy="12" r="9"/>
            </svg>
            <span class="btn-label">Circle</span>
          </button>

          <button class="tool-btn" id="tool-eraser" title="Eraser (E)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21Z"/>
              <path d="M22 21H7M18 12 9 21"/>
            </svg>
            <span class="btn-label">Eraser</span>
          </button>
        </div>
      </nav>

      <nav class="tool-section actions">
        <h3 class="section-title">Actions</h3>
        <div class="action-list">
          <button class="action-btn" id="action-undo" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M3 7v6h6"/>
              <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
            </svg>
            <span>Undo</span>
          </button>
          
          <button class="action-btn" id="action-redo" title="Redo (Ctrl+Y)">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M21 7v6h-6"/>
              <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/>
            </svg>
            <span>Redo</span>
          </button>

          <button class="action-btn danger" id="action-clear" title="Clear Canvas">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>
            </svg>
            <span>Clear</span>
          </button>

          <button class="action-btn success" id="action-save" title="Save Drawing (Ctrl+S)">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            <span>Save PNG</span>
          </button>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        v1.0.0
      </div>
    </aside>

    <!-- Main Workspace Area -->
    <main class="workspace">
      <!-- Top Properties Bar -->
      <header class="properties-bar">
        <div class="property-group">
          <label for="stroke-color" class="property-label">Stroke</label>
          <div class="color-picker-wrapper">
            <input type="color" id="stroke-color" value="#6366f1" title="Choose Stroke Color">
            <span class="color-preview" id="stroke-color-preview" style="background-color: #6366f1;"></span>
          </div>
        </div>

        <div class="property-group">
          <label for="brush-size" class="property-label">Width</label>
          <input type="range" id="brush-size" min="1" max="50" value="5" class="size-slider">
          <span class="size-badge" id="brush-size-badge">5px</span>
        </div>

        <div class="divider"></div>

        <div class="property-group">
          <label class="toggle-container">
            <input type="checkbox" id="fill-shape">
            <span class="toggle-slider"></span>
            <span class="property-label">Fill Shape</span>
          </label>
        </div>

        <div class="property-group disabled" id="fill-color-group">
          <label for="fill-color" class="property-label">Fill Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="fill-color" value="#a5b4fc" title="Choose Fill Color" disabled>
            <span class="color-preview disabled" id="fill-color-preview" style="background-color: #a5b4fc;"></span>
          </div>
        </div>
      </header>

      <!-- Drawing Canvas Area -->
      <div class="canvas-container" id="canvas-container">
        <!-- Canvas grids/background can be rendered using CSS -->
        <canvas id="drawing-canvas"></canvas>
      </div>

      <!-- Bottom Status Bar -->
      <footer class="status-bar">
        <div class="status-item">
          <span class="status-dot"></span>
          <span id="status-tool">Tool: Pencil</span>
        </div>
        <div class="status-item" id="status-coords">
          X: 0px, Y: 0px
        </div>
        <div class="status-item" id="status-size">
          Canvas: 0 x 0
        </div>
      </footer>
    </main>

  </div>

  <script src="renderer.js"></script>
</body>
</html>

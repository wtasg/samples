services:
  v8-go-integration:
    build:
      context: ./v8-go-integration-example
      dockerfile: Dockerfile
    ports:
      - "${V8_GO_PORT}:${V8_GO_PORT}"
    environment:
      - PORT=${V8_GO_PORT}

  graphviz-flow:
    build:
      context: ./dynamic-graphviz-svg-example
      dockerfile: Dockerfile
    ports:
      - "${GRAPHVIZ_FLOW_PORT}:${GRAPHVIZ_FLOW_PORT}"
    environment:
      - PORT=${GRAPHVIZ_FLOW_PORT}
      - HOST=0.0.0.0

  toydb-server:
    build:
      context: .
      dockerfile: ./rdbms-example/Dockerfile
    ports:
      - "${TOYDB_SERVER_PORT}:9090"
    volumes:
      - toydb-data:/app/data

  toydb-client:
    build:
      context: .
      dockerfile: ./rdbms-client-example/Dockerfile
    ports:
      - "${TOYDB_CLIENT_PORT}:8080"
    environment:
      - TOYDB_ADDR=http://toydb-server:9090
      - PORT=8080
    depends_on:
      - toydb-server

  docdb-server:
    build:
      context: .
      dockerfile: ./docdb-example/Dockerfile
    ports:
      - "${DOCDB_SERVER_PORT}:60013"
    volumes:
      - docdb-data:/app/data

  docdb-client:
    build:
      context: .
      dockerfile: ./docdb-client-example/Dockerfile
    ports:
      - "${DOCDB_CLIENT_PORT}:8080"
    environment:
      - DOCDB_ADDR=http://docdb-server:60013
      - PORT=8080
    depends_on:
      - docdb-server

volumes:
  toydb-data:
  docdb-data:

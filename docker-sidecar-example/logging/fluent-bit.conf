[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name             tail
    Path             /var/log/app/access.log
    Parser           json_parser
    Tag              app.access
    Refresh_Interval 1
    Read_from_Head   true

[FILTER]
    Name         record_modifier
    Match        *
    Record       sidecar_name fluent-bit
    Record       observability_system sidecar_logging

[OUTPUT]
    Name   stdout
    Match  *
